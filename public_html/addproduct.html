    <section id="product" class="zx__Root">
      <div class="container">
        <!-- JUDUL & TOMBOL KEMBALI -->
        <div class="row mb-3">
          <div class="col-lg-12 d-flex justify-content-between align-items-center">
            <h4 class="m-0"><i class="bi bi-plus-circle-fill"></i> Tambah Produk</h4>
            <a href="index.html" class="btn btn-outline-secondary btn-sm"> <i class="bi bi-arrow-left"></i> Back To Home</a>
          </div>
        </div>

        <!-- FORM TAMBAH PRODUK -->
        <div class="row d-flex justify-content-center">
          <div class="col-lg-12">
            <form id="addProductForm">
              <div class="row g-3">
                <!-- KIRI: Nama & Harga -->
                <div class="col-lg-6">
                  <div class="card">
                    <div class="mb-3">
                      <label for="nama" class="form-label">Nama Produk <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="nama" placeholder="Contoh: Nasi Goreng Spesial" required />
                    </div>
                    <div class="mb-3">
                      <label for="price" class="form-label">Harga (Rp) <span class="text-danger">*</span></label>
                      <input type="number" id="price" class="form-control" placeholder="Contoh: 15000" min="1" required />
                    </div>
                    <div class="mb-3">
                      <label for="category" class="form-label">Kategori <span class="text-danger">*</span></label>
                      <select class="form-select" id="category" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option value="Makanan">🍳 Makanan</option>
                        <option value="Minuman">🥤 Minuman</option>
                        <option value="Makanan ringan">🍪 Makanan ringan</option>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- KANAN: URL Gambar & Preview -->
                <div class="col-lg-6">
                  <div class="card">
                    <div class="mb-3">
                      <label for="img" class="form-label">Image URL <span class="text-muted fw-normal">(opsional)</span></label>
                      <input type="text" class="form-control" id="img" placeholder="https://example.com/image.jpg" />
                      <div class="form-text">Kosongkan jika tidak ada gambar.</div>
                    </div>
                    <!-- Preview Gambar -->
                    <div class="text-center">
                      <p class="form-label fw-semibold mb-1">Preview Gambar</p>
                      <img id="imgPreview" src="" alt="Preview" class="img-thumbnail d-none" style="width: 120px; height: 120px; object-fit: cover" />
                      <div id="imgPlaceholder" class="imgPlaceholder">
                        <i class="bi bi-image fs-1"></i>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- TOMBOL SUBMIT -->
                <div class="col-lg-12 d-flex justify-content-center align-items-center gap-2 mt-4">
                  <button type="reset" class="btn btnReset" id="btnReset">Clear</button>
                  <button type="submit" class="btn btnSubmit" id="btnAddProduct"><i class="bi bi-plus-circle"></i> Tambah Produk</button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <!-- TABEL DAFTAR PRODUK CUSTOM -->
        <div class="row d-flex justify-content-center mt-5">
          <div class="col-lg-12">
            <h5 class="mb-3 produkTabel"><i class="bi bi-list-ul"></i> Produk yang Ditambahkan</h5>

            <!-- Empty state -->
            <div id="emptyState" class="text-muted">
              <i class="bi bi-inbox fs-1 d-block mb-2"></i>
              <h5>Belum ada produk yang ditambahkan.</h5>
            </div>
          </div>
        </div>
        <!-- Table -->
        <div class="table-responsive row d-flex justify-content-center align-items-center mb-4" id="productTable">
          <div class="col-lg-1 zxHeader" id="zxTabel">No.</div>
          <div class="col-lg-3 zxHeader" id="zxTabel">Gambar</div>
          <div class="col-lg-2 zxHeader" id="zxTabel">Nama Produk</div>
          <div class="col-lg-2 zxHeader" id="zxTabel">Harga Produk</div>
          <div class="col-lg-2 zxHeader" id="zxTabel">Kategori</div>
          <div class="col-lg-2 zxHeader" id="zxTabel">Aksi</div>
        </div>
        <!-- Table body -->
        <div id="productContainer" class="product-scroll"></div>
      </div>
    </section>
